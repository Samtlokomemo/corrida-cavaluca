<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Configurações do Jogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Fontdiner Swanky", sans-serif;
      background-image: url("fundo.png");
      color: #FCD136;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .config-container {
      background: #2c2c3e;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: "Fontdiner Swanky", sans-serif;  
      text-align: center;
      margin-bottom: 20px;
    }

    .option {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input[type="range"] {
      width: 100%;
    }

    select, input[type="checkbox"] {
      margin-top: 5px;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .save {
      background: #4CAF50;
      color: white;
    }

    .cancel {
      background: #f44336;
      color: white;
    }
  </style>
</head>
<body>

<div class="config-container">
  <h1>Configurações</h1>

  <div class="option">
    <label for="volume">Volume: <span id="volumeValue">50</span>%</label>
    <input type="range" id="volume" min="0" max="100" value="50">
  </div>

  <div class="option">
    <label for="music">Música</label>
    <input type="checkbox" id="music" checked>
  </div>

  <div class="option">
    <label for="difficulty">Dificuldade</label>
    <select id="difficulty">
      <option>Fácil</option>
      <option>Médio</option>
      <option>Difícil</option>
    </select>
  </div>

  <div class="option">
    <label for="resolution">Resolução</label>
    <select id="resolution">
      <option>1280x720</option>
      <option>1920x1080</option>
      <option>2560x1440</option>
    </select>
  </div>

  <div class="buttons">
    <button class="save" onclick="saveSettings()">Salvar</button>
    <button class="cancel" onclick="cancelSettings()">Cancelar</button>
  </div>
</div>

<script>
  const volumeSlider = document.getElementById("volume");
  const volumeValue = document.getElementById("volumeValue");

  volumeSlider.addEventListener("input", () => {
    volumeValue.textContent = volumeSlider.value;
  });

  function saveSettings() {
    window.location.href = "index.html";
  }

  function cancelSettings() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
